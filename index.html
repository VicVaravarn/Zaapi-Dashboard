<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zaapi · CW9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0c10;--sur:#111318;--sur2:#171a22;--bdr:#252a38;--bdr2:#2f3549;
  --acc:#7c6af7;--grn:#34d399;--red:#f87171;--amb:#fbbf24;--blu:#60a5fa;--pnk:#f472b6;--tel:#2dd4bf;
  --th:#7c6af7;--sea:#2dd4bf;--row:#fbbf24;--gl:#60a5fa;
  --t1:#e8eaf0;--t2:#9aa0b4;--t3:#555e78;
  --mono:'DM Mono',monospace;--head:'Syne',sans-serif;--body:'DM Sans',sans-serif;--r:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:var(--body);font-size:13px;line-height:1.5;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(124,106,247,.025)1px,transparent 1px),linear-gradient(90deg,rgba(124,106,247,.025)1px,transparent 1px);
  background-size:40px 40px}
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,12,16,.93);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bdr);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--head);font-size:17px;font-weight:800;letter-spacing:-.5px;color:var(--acc)}
.logo span{color:var(--t3);font-weight:600}
.ctrlbar{padding:9px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  background:var(--sur);border-bottom:1px solid var(--bdr);position:sticky;top:52px;z-index:90}
.cg{display:flex;gap:2px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.cb{padding:5px 14px;background:transparent;border:none;cursor:pointer;color:var(--t2);
  font-family:var(--body);font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap}
.cb:hover{color:var(--t1);background:var(--sur2)}
.cb.on{background:var(--acc);color:#fff;font-weight:600}
.clbl{font-size:10px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px}
.badge{font-family:var(--mono);font-size:10px;color:var(--grn);border:1px solid rgba(52,211,153,.3);background:rgba(52,211,153,.08);border-radius:20px;padding:3px 10px}
.main{padding:16px 24px;position:relative;z-index:1}
.sbar{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:7px;margin-bottom:14px}
.sig{display:flex;gap:9px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);
  padding:9px 13px;border-left:3px solid transparent}
.sig.up{border-left-color:var(--grn)}.sig.dn{border-left-color:var(--red)}
.sig.wn{border-left-color:var(--amb)}.sig.nfo{border-left-color:var(--blu)}
.sico{font-size:13px;line-height:1;margin-top:1px;flex-shrink:0}
.stag{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;font-family:var(--mono);margin-bottom:2px}
.sig.up .stag{color:var(--grn)}.sig.dn .stag{color:var(--red)}.sig.wn .stag{color:var(--amb)}.sig.nfo .stag{color:var(--blu)}
.stxt{font-size:11px;color:var(--t1);line-height:1.4}
.krow{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;margin-bottom:14px}
.kpi{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--ka,transparent)}
.klbl{font-size:9px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.kval{font-size:21px;font-weight:700;font-family:var(--head);letter-spacing:-.5px}
.kd{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:var(--mono);font-weight:500;margin-top:4px;margin-bottom:4px}
.kd.up{color:var(--grn)}.kd.dn{color:var(--red)}.kd.fl{color:var(--t3)}
.chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.chip{font-size:9.5px;font-family:var(--mono);padding:2px 6px;border-radius:4px;font-weight:500}
.cth{background:rgba(124,106,247,.15);color:var(--th)}.csea{background:rgba(45,212,191,.15);color:var(--sea)}
.crow{background:rgba(251,191,36,.15);color:var(--row)}.cgl{background:rgba(96,165,250,.15);color:var(--gl)}
.tpct{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-family:var(--mono);
  padding:2px 6px;border-radius:4px;font-weight:600;margin-top:2px}
.tpct.ok{background:rgba(52,211,153,.1);color:var(--grn)}.tpct.wn{background:rgba(251,191,36,.1);color:var(--amb)}
.tpct.bd{background:rgba(248,113,113,.1);color:var(--red)}
.prnote{font-size:8px;color:var(--t3);font-family:var(--mono);margin-top:1px;display:block}
.grid{display:grid;gap:11px;margin-bottom:11px}
.g2{grid-template-columns:1fr 1fr}.g21{grid-template-columns:2fr 1fr}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:14px}
.ctit{font-size:12px;font-weight:600;color:var(--t1);font-family:var(--head);margin-bottom:3px}
.csub{font-size:10px;color:var(--t3);font-family:var(--mono);margin-bottom:8px}
.leg{display:flex;gap:11px;margin-bottom:7px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2);font-family:var(--mono)}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.cbox{position:relative}
.h150{height:150px}.h170{height:170px}.h190{height:190px}.h210{height:210px}
.sec{display:flex;align-items:center;gap:10px;margin:14px 0 9px}
.slbl{font-family:var(--mono);font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);white-space:nowrap}
.sln{flex:1;height:1px;background:var(--bdr)}
.ctab{width:100%;border-collapse:collapse}
.ctab th{font-size:9px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;
  padding:0 7px 7px;text-align:left;border-bottom:1px solid var(--bdr)}
.ctab th:not(:first-child){text-align:right}
.ctab td{padding:7px;font-size:11.5px;border-bottom:1px solid rgba(37,42,56,.4);vertical-align:middle}
.ctab td:not(:first-child){text-align:right;font-family:var(--mono)}
.ctab tr:last-child td{border-bottom:none}
.ctab tr:hover td{background:rgba(255,255,255,.012)}
.cname{display:flex;align-items:center;gap:7px;font-weight:600}
.cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dtag{font-size:9px;font-family:var(--mono);font-weight:600}
.dtag.up{color:var(--grn)}.dtag.dn{color:var(--red)}.dtag.fl{color:var(--t3)}
.rstack{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ri{display:flex;flex-direction:column;background:var(--sur2);border-radius:6px;padding:6px 9px;flex:1;min-width:65px}
.rilbl{font-size:8px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.rival{font-size:13px;font-weight:600;font-family:var(--head)}
@media(max-width:900px){.g2,.g21{grid-template-columns:1fr}.krow{grid-template-columns:1fr 1fr}}
@media(max-width:500px){.krow{grid-template-columns:1fr}.topbar,.main{padding-left:14px;padding-right:14px}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fi{animation:fu .22s ease both}
</style>
</head>

<div class="topbar">

  <span class="badge" id="dbadge">● Loading…</span>
</div>
<div class="ctrlbar">

    <span class="clbl">View</span>
    <div class="cg"><button class="cb on" id="bw" onclick="setView('W')">Weekly</button><button class="cb" id="bm" onclick="setView('M')">Monthly</button></div>
  </div>
  <div style="display:flex;align-items:center;gap:6px">

</div>

// ── utils ─────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const fN=n=>n==null?'–':Math.round(n).toLocaleString('en-US');
const fK=n=>n==null?'–':Math.abs(n)>=1000?'$'+(n/1000).toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1})+'k':'$'+Math.round(n);
const fU=n=>n==null?'–':'$'+Math.round(n).toLocaleString('en-US');
const fX=n=>n==null?'–':n.toFixed(2)+'x';
const fD=s=>{const d=new Date(s);return d.toLocaleString('en',{month:'short'})+' '+d.getDate();};
const fCW=n=>n!=null?'CW'+n:'–';
// last non-null (0 is valid)
function lv(a){if(!a)return null;for(let i=a.length-1;i>=0;i--)if(a[i]!=null)return a[i];return null;}
// second-to-last non-null
function pv(a){if(!a)return null;let n=0;for(let i=a.length-1;i>=0;i--){if(a[i]!=null&&++n===2)return a[i];}return null;}
// last non-null non-zero (spend/CAC — 0 means not yet entered)
function lnz(a){if(!a)return null;for(let i=a.length-1;i>=0;i--)if(a[i]!=null&&a[i]!==0)return a[i];return null;}
function wowPct(a,nz=false){const c=nz?lnz(a):lv(a),p=pv(a);return c!=null&&p!=null&&p!==0?(c-p)/Math.abs(p)*100:null;}
function dh(p,inv=false){
  if(p==null)return`<span class="kd fl">–</span>`;
  const ok=inv?p<=0:p>=0;
  return`<span class="kd ${ok?'up':'dn'}">${p>=0?'▲':'▼'} ${Math.abs(p).toFixed(1)}%</span>`;
}
const PR=RAW.prorate_factor;
// Target badge: pro-rate=true → compare vs monthly_target × PR
// Thresholds: ≥85% = green (on track), 60-84% = amber (watch), <60% = red (behind)
function tb(actual,moTgt,proRate=false){
  if(actual==null||moTgt==null||moTgt===0)return'';
  const tgt=proRate?moTgt*PR:moTgt, p=actual/tgt*100;
  const cls=p>=85?'ok':p>=60?'wn':'bd';
  const note=proRate?`<span class="prnote">vs ${Math.round(tgt)} pro-rated (${Math.round(PR*100)}% of mo)</span>`:'';
  return`<span class="tpct ${cls}">▸ ${Math.round(p)}%</span>${note}`;
}
function leg(it){return`<div class="leg">${it.map(i=>`<span class="li"><span class="ld" style="background:${i.c}"></span>${i.l}</span>`).join('')}</div>`;}
const CM={Global:'#60a5fa',TH:'#7c6af7',SEA:'#2dd4bf',ROW:'#fbbf24'};

// Country-specific array getter — NO fallback to Global for country views
// If a country has no data for a metric, returns null-filled array
function cGet(obj,C){
  if(!obj)return[];
  if(obj[C]!==undefined)return obj[C];
  const ref=obj.Global;return ref?ref.map(()=>null):[];
}
// Revenue: pick correct country key. Explicit null = no data for this country/type.
function rGet(rev,C,type){
  const k=`${C==='Global'?'Global':C}_${type}`;
  if(Object.prototype.hasOwnProperty.call(rev,k)){
    // null means intentionally no data (e.g. SEA_Target)
    return rev[k] || (rev.Global_Total||[]).map(()=>null);
  }
  return(rev.Global_Total||[]).map(()=>null);
}
// Revenue target: only Global has a weekly target; TH/SEA/ROW don't
function hasRevTarget(C){return C==='Global';}

// ── signals (reactive to both V and C) ───────────────────────
function buildSigs(){
  const d=RAW.wow,m=RAW.mom,sigs=[];

  // 1. Revenue pacing — pro-rated for weekly, full-month for monthly
  const rA_w=rGet(d.revenue,C,'Total'),rT_w=d.revenue.Global_Target;
  const rA_m=rGet(m.revenue,C,'Total'),rT_m=m.revenue.Global_Target;
  if(V==='W'){
    const lA=lv(rA_w),lT=lnz(rT_w);
    if(lA!=null&&lT!=null&&lT>0){
      const proTgt=lT*PR,p=(lA/proTgt*100).toFixed(0),tp=+p;
      const cls=tp>=85?'up':tp>=60?'wn':'dn';
      sigs.push({cls,ico:tp>=85?'✓':'△',tag:`Revenue Pacing · ${C}`,
        txt:`${C} weekly rev ${fK(lA)} vs pro-rated target ${fK(proTgt)} (${p}%). Full-mo target: ${fK(lT)}.`});
    }
  } else {
    const lA=lnz(rA_m),lT=lnz(rT_m);
    if(lA!=null&&lT!=null&&lT>0){
      const p=(lA/lT*100).toFixed(0),tp=+p,cls=tp>=90?'up':tp>=70?'wn':'dn';
      sigs.push({cls,ico:tp>=90?'✓':'△',tag:`Revenue vs Target · ${C}`,
        txt:`${C} rev ${fK(lA)} vs ${fK(lT)} target (${p}% of plan).`});
    }
  }

  // 2. Revenue mix
  const rN=lnz(V==='W'?rGet(d.revenue,C,'New'):rGet(m.revenue,C,'New'));
  const rR=lnz(V==='W'?rGet(d.revenue,C,'Renewal'):rGet(m.revenue,C,'Renewal'));
  if(rN!=null&&rR!=null&&(rN+rR)>0){
    const pN=(rN/(rN+rR)*100).toFixed(0);
    sigs.push({cls:'nfo',ico:'◎',tag:`Revenue Mix · ${C}`,
      txt:`New ${pN}% / Renewal ${100-+pN}% of tracked rev. ${+pN>50?'Growth-led.':'Retention-led.'}`});
  }

  // 3. Subs pacing
  if(V==='W'){
    const sA=cGet(d.subs,C),moT=C==='TH'?lnz(d.subs_target_monthly.TH):lnz(d.subs_target_monthly.Global);
    const lA=lv(sA);
    if(lA!=null&&moT!=null&&moT>0){
      const proTgt=moT*PR,p=(lA/proTgt*100).toFixed(0),tp=+p;
      const cls=tp>=85?'up':tp>=60?'wn':'dn';
      sigs.push({cls,ico:cls==='up'?'✓':'△',tag:`Subs Pacing · ${C}`,
        txt:`${C} new subs ${lA} vs pro-rated ${Math.round(proTgt)} (${p}%). Monthly target: ${Math.round(moT)}.`});
    }
  } else {
    const sA=m.subs[C]||m.subs.Global,lA=lnz(sA),lT=lnz(m.subs_target.Global);
    if(lA!=null&&lT!=null&&lT>0){
      const p=(lA/lT*100).toFixed(0),tp=+p;
      sigs.push({cls:tp>=90?'up':tp>=70?'wn':'dn',ico:tp>=90?'✓':'△',
        tag:`Subs Achievement · ${C}`,txt:`${C} monthly subs ${lA} vs target ${Math.round(lT)} (${p}%).`});
    }
  }

  // 4. CAC direction (ROW has no CAC data)
  if(C!=='ROW'){
    const cA=V==='W'?(d.blended_cac[C]||d.blended_cac.Global):(m.blended_cac[C]||m.blended_cac.Global);
    const vals=(cA||[]).filter(v=>v!=null&&v>0);
    if(vals.length>=2){
      const lC=vals[vals.length-1],pC=vals[vals.length-2],delta=((lC-pC)/pC*100).toFixed(1);
      sigs.push({cls:lC<=pC?'up':'dn',ico:lC<=pC?'↓':'↑',tag:`Blended CAC · ${C}`,
        txt:`${C} CAC ${fU(lC)} (${+delta>=0?'+':''}${delta}% ${V==='W'?'WoW':'MoM'}). Lower = more efficient.`});
    }
  }

  // 5. HQ+ trend
  const hqSrc=(V==='W'?d.hqplus:m.hqplus);
  const hqA=hqSrc[C]||hqSrc.Global||[];
  const hqv=hqA.filter(v=>v!=null);
  if(hqv.length>=6){
    const l4=hqv.slice(-4).reduce((a,b)=>a+b,0)/4;
    const p4a=hqv.slice(-8,-4).filter(v=>v!=null);
    if(p4a.length>=2){
      const p4=p4a.reduce((a,b)=>a+b,0)/p4a.length,delta=((l4-p4)/p4*100).toFixed(1);
      sigs.push({cls:+delta>=0?'up':'dn',ico:+delta>=0?'↑':'↓',
        tag:`HQ+ ${+delta>=0?'Up':'Declining'} · ${C}`,
        txt:`${C} HQ+ L4 avg ${l4.toFixed(0)} — ${+delta>=0?'+':''}${delta}% vs prior 4 periods.`});
    }
  }

  // 6. Spend pacing (weekly only, skip ROW)
  if(V==='W'&&C!=='ROW'){
    const spW=cGet(d.adspend,C),spMT=m.adspend_target[C]||m.adspend_target.Global;
    const lSpW=lnz(spW),lSpT=lnz(spMT);
    if(lSpW!=null&&lSpT!=null&&lSpT>0){
      const proTgt=lSpT*PR,p=(lSpW/proTgt*100).toFixed(0),tp=+p;
      const cls=tp>=70&&tp<=130?'up':tp<70?'wn':'nfo';
      sigs.push({cls,ico:cls==='up'?'✓':'△',tag:`Spend Pacing · ${C}`,
        txt:`Weekly spend ${fK(lSpW)} vs pro-rated ${fK(proTgt)} (${p}%). Monthly budget: ${fK(lSpT)}.`});
    }
  }

  return sigs.slice(0,5);
}
function sigsHTML(){
  return`<div class="sbar fi">${buildSigs().map(s=>`
    <div class="sig ${s.cls}">
      <div class="sico">${s.ico}</div>
      <div><div class="stag">${s.tag}</div><div class="stxt">${s.txt}</div></div>
    </div>`).join('')}</div>`;
}

// ── MONTHLY ───────────────────────────────────────────────────
function buildM(){
  const m=RAW.mom,isG=C==='Global',col=CM[C]||'#60a5fa',lbls=m.months;
  const revA=rGet(m.revenue,C,'Total'),revT=m.revenue.Global_Target;
  const revNew=rGet(m.revenue,C,'New'),revRen=rGet(m.revenue,C,'Renewal'),revUpg=rGet(m.revenue,C,'Upgrade');
  // Strict country getters — never fall back to Global for ROW
  const isROW=C==='ROW';
  const subA=m.subs[C]!==undefined?m.subs[C]:m.subs.Global;
  const subT=isROW?null:(m.subs_target[C]!==undefined&&m.subs_target[C]!==null?m.subs_target[C]:C==='Global'?m.subs_target.Global:null);
  const spA=m.adspend[C]!==undefined?m.adspend[C]:m.adspend.Global;
  const spT=isROW?null:(m.adspend_target[C]||m.adspend_target.Global);
  const cacA=isROW?null:(m.blended_cac[C]!==undefined?m.blended_cac[C]:m.blended_cac.Global),cacT=m.cac_target.Global;
  const hqA=m.hqplus[C]!==undefined?m.hqplus[C]:null; // null for ROW — no HQ+ data
  const roasA=isROW?null:(m.roas[C]||m.roas.Global);
  const cacAvg=cacA?(cacA.filter(v=>v!=null&&v>0).reduce((s,v,_,a)=>s+v/a.length,0)):0;

  $('app').innerHTML=kpisHTML()+sigsHTML()+`<div class="fi">
  <div class="sec"><span class="slbl">① Revenue & Subscriptions</span><span class="sln"></span></div>
  <div class="grid g2">
    <div class="card">
      <div class="ctit">Monthly Revenue vs Target · ${isG?'Global':C}</div>
      <div class="csub">Bars = actual · dashed = target</div>
      ${leg([{l:'Actual',c:col},...(hasRevTarget(C)?[{l:'Target',c:'#555e78'}]:[])])}
      <div class="cbox h190"><canvas id="cm-rev"></canvas></div>
    </div>
    <div class="card">
      <div class="ctit">Revenue Mix · ${isG?'Global':C}</div>
      <div class="csub">New · Renewal · Upgrade stacked</div>
      ${leg([{l:'New',c:'var(--blu)'},{l:'Renewal',c:'var(--tel)'},{l:'Upgrade',c:'var(--acc)'}])}
      <div class="cbox h190"><canvas id="cm-mix"></canvas></div>
    </div>
  </div>
  <div class="grid g2">
    <div class="card">
      <div class="ctit">New Subscriptions vs Target · ${isG?'Global':C}</div>
      <div class="csub">Bars = actual · dashed = target</div>
      ${leg([{l:'Actual',c:'var(--tel)'},...(subT?[{l:'Target',c:'#555e78'}]:[])])}
      <div class="cbox h170"><canvas id="cm-subs"></canvas></div>
    </div>
    <div class="card">
      <div class="ctit">HQ+ Sign-ups · ${isG?'Global · TH':C}</div>
      <div class="csub">Monthly qualified sign-ups</div>
      ${isG?leg([{l:'Global',c:'var(--gl)'},{l:'TH',c:'var(--th)'}]):leg([{l:C,c:col}])}
      <div class="cbox h170"><canvas id="cm-hq"></canvas></div>
    </div>
  </div>
  <div class="sec"><span class="slbl">② Marketing</span><span class="sln"></span></div>
  <div class="grid g2">
    <div class="card">
      <div class="ctit">Ad Spend vs Budget · ${isG?'Global':C}</div>
      <div class="csub">Bars = actual · dashed = budget</div>
      ${leg([{l:'Actual',c:'var(--blu)'},{l:'Budget',c:'#555e78'}])}
      <div class="cbox h170"><canvas id="cm-spend"></canvas></div>
    </div>
    <div class="card">
      <div class="ctit">Blended CAC vs Target · ${C==='ROW'?'N/A':isG?'Global':C}</div>
      <div class="csub">Lower is better · dashed = target · dotted = 2025 avg</div>
      ${C==='ROW'?leg([{l:'No CAC data for ROW',c:'var(--t3)'}]):
        leg([{l:'CAC',c:'var(--amb)'},{l:'Target',c:'#555e78'},{l:'Avg',c:'var(--pnk)'}])}
      <div class="cbox h170"><canvas id="cm-cac"></canvas></div>
    </div>
  </div>
  <div class="grid g2">
    <div class="card">
      <div class="ctit">ROAS · 1x Breakeven · ${isG?'Global':C}</div>
      <div class="csub">Blended return on ad spend</div>
      ${leg([{l:'ROAS',c:'var(--gl)'},{l:'1x',c:'var(--red)'}])}
      <div class="cbox h150"><canvas id="cm-roas"></canvas></div>
    </div>
  </div>
  <div class="sec"><span class="slbl">③ Account Management</span><span class="sln"></span></div>
  <div class="grid g2">
    <div class="card">
      <div class="ctit">Active Subscriber Base · <span id="sticky-region"></span></div>
      <div class="csub">Stickiness = renewal commitment depth</div>
      <div id="sticky-body"></div>
    </div>
    <div class="card">
      <div class="ctit">Renewal Forecast · <span id="fc-period"></span></div>
      <div class="csub" id="fc-sub"></div>
      <div id="forecast-body"></div>
    </div>
  </div>
  </div>`;

  requestAnimationFrame(()=>{
    mkC('cm-rev','bar',[
      mkB('Rev',revA,col),...(hasRevTarget(C)?[{...mkL('Tgt',revT,'#555e78',false,[6,4]),type:'line',pointRadius:0}]:[]),
    ],lbls,{plugins:{...BS.plugins,tooltip:{...TT,callbacks:{label:c=>'$'+Math.round(c.parsed.y).toLocaleString()}}}});

    mkC('cm-mix','bar',[
      mkB('Upgrade',revUpg,'#7c6af7'),mkB('Renewal',revRen,'#2dd4bf'),mkB('New',revNew,'#60a5fa'),
    ],lbls,{scales:{x:{stacked:true,grid:GR,ticks:TK},y:{stacked:true,grid:GR,ticks:{...TK,callback:v=>'$'+Math.round(v/1000)+'k'}}}});

    mkC('cm-subs','bar',[
      mkB('Subs',subA,'#2dd4bf'),...(subT?[{...mkL('Tgt',subT,'#555e78',false,[6,4]),type:'line',pointRadius:0}]:[]),
    ],lbls);

    if(isG){mkC('cm-hq','bar',[mkB('G',m.hqplus.Global,'#60a5fa'),mkB('TH',m.hqplus.TH,'#7c6af7')],lbls);}
    else{mkC('cm-hq','bar',[mkB(C,hqA,col)],lbls);}

    mkC('cm-spend','bar',[
      mkB('Sp',spA,'#60a5fa'),...(spT?[{...mkL('Budget',spT,'#555e78',false,[6,4]),type:'line',pointRadius:0}]:[]),
    ],lbls,{plugins:{...BS.plugins,tooltip:{...TT,callbacks:{label:c=>'$'+Math.round(c.parsed.y).toLocaleString()}}}});

    if(C==='ROW'){mkC('cm-cac','line',[],lbls);}
    else{
      mkC('cm-cac','bar',[
        mkB('CAC',cacA,'#fbbf24'),{...mkL('Tgt',cacT,'#555e78',false,[6,4]),type:'line',pointRadius:0},
        {...mkL('Avg',lbls.map(()=>cacAvg>0?cacAvg:null),'#f472b6',false,[3,3]),type:'line',pointRadius:0},
      ],lbls);
    }

    mkC('cm-roas','line',[
      ...(roasA?[mkL('ROAS',roasA,'#60a5fa',true)]:[]),
      {...mkL('1x',lbls.map(()=>1),'#f87171',false,[4,3]),pointRadius:0},
    ],lbls,{plugins:{...BS.plugins,tooltip:{...TT,callbacks:{label:c=>c.parsed.y.toFixed(2)+'x'}}}});
    renderAM();
  });
}


// ── ACCOUNT MANAGEMENT ─────────────────────────────────────
// Stickiness definition (from Stickiness Score tab):
//   Inactive = 0% capture rate
//   Low      = <29% capture rate
//   Medium   = 29–99% capture rate
//   High     = 100% capture rate
// Active = Medium + High

const SC = {High:'#34d399',Medium:'#60a5fa',Low:'#fbbf24',Inactive:'#f87171',Churned:'#555e78'};

function renderAM(){
  const am = RAW.am;
  const reg = C==='Global'?'Global':C==='TH'?'TH':C==='SEA'?'SEA':'ROW';
  const sc  = am.stickiness[reg] || {};
  const total = am.total_subs[reg] || 0;
  const active = (sc.High||0)+(sc.Medium||0);
  const activePct = total>0?Math.round(active/total*100):0;
  const uplift = am.uplift_multiplier;

  // ── Card 1: Stickiness ──
  const order = ['High','Medium','Low','Inactive','Churned'];
  const barSegs = order.filter(k=>(sc[k]||0)>0).map(k=>{
    const pct = total>0?((sc[k]||0)/total*100):0;
    return `<div style="width:${pct.toFixed(1)}%;background:${SC[k]};height:100%;min-width:2px" title="${k}: ${sc[k]||0}"></div>`;
  }).join('');

  const chips = order.filter(k=>(sc[k]||0)>0).map(k=>`
    <div style="display:flex;flex-direction:column;background:var(--sur2);border-radius:7px;padding:8px 11px;flex:1;min-width:65px;border-left:3px solid ${SC[k]}">
      <span style="font-size:8px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">${k}</span>
      <span style="font-size:20px;font-weight:700;font-family:var(--head);color:${SC[k]}">${sc[k]||0}</span>
      <span style="font-size:9px;font-family:var(--mono);color:var(--t2)">${total>0?Math.round((sc[k]||0)/total*100):0}%</span>
    </div>`).join('');

  $('sticky-region').textContent = reg==='Global'?'All Regions':reg;
  $('sticky-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="font-size:32px;font-weight:800;font-family:var(--head)">${total}</span>
      <div>
        <div style="font-size:11px;color:var(--t2)">active subscribers</div>
        <div style="font-size:10px;font-family:var(--mono);color:var(--grn)">${active} active (${activePct}%) · Medium + High stickiness</div>
      </div>
    </div>
    <div style="display:flex;gap:2px;height:8px;border-radius:4px;overflow:hidden;margin-bottom:12px;background:var(--bdr)">${barSegs}</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap">${chips}</div>
    <div style="margin-top:10px;padding:8px 10px;background:var(--sur2);border-radius:6px;font-size:9.5px;color:var(--t3);font-family:var(--mono);line-height:1.7">
      <span style="color:var(--grn)">High</span> 100% msg capture rate &nbsp;·&nbsp;
      <span style="color:var(--blu)">Medium</span> 29–99% &nbsp;·&nbsp;
      <span style="color:var(--amb)">Low</span> &lt;29% &nbsp;·&nbsp;
      <span style="color:var(--red)">Inactive</span> 0%
    </div>`;

  // ── Card 2: Renewal Forecast ──
  const isW = V==='W';
  const dueCWs = am.due_cws; // [10,11,12,13,14]
  $('fc-period').textContent = isW ? `CW${dueCWs[0]}–CW${dueCWs[dueCWs.length-1]}` : 'March 2026';
  $('fc-sub').textContent = `Min = Medium+High renew at last billing price · Adj = +${((uplift-1)*100).toFixed(1)}% historical upgrade uplift`;

  if(isW){
    const rows = dueCWs.map(cw=>{
      const d = am.forecast[`${reg}_CW${cw}`]||{};
      if(!d.count) return '';
      return `<tr>
        <td><span style="font-family:var(--mono);font-weight:600;color:var(--acc)">CW${cw}</span></td>
        <td style="text-align:right;font-family:var(--mono)">${d.count}</td>
        <td style="text-align:right;font-family:var(--mono);color:var(--grn)">${d.mh_count}</td>
        <td style="text-align:right;font-family:var(--mono);color:var(--grn)">$${fN(d.min_forecast)}</td>
        <td style="text-align:right;font-family:var(--mono);color:var(--blu)">$${fN(d.adj_forecast)}</td>
      </tr>`;
    }).join('');
    const totMin = dueCWs.reduce((s,cw)=>s+(am.forecast[`${reg}_CW${cw}`]?.min_forecast||0),0);
    const totAdj = dueCWs.reduce((s,cw)=>s+(am.forecast[`${reg}_CW${cw}`]?.adj_forecast||0),0);
    const totCt  = dueCWs.reduce((s,cw)=>s+(am.forecast[`${reg}_CW${cw}`]?.count||0),0);
    const totMH  = dueCWs.reduce((s,cw)=>s+(am.forecast[`${reg}_CW${cw}`]?.mh_count||0),0);

    $('forecast-body').innerHTML = `
      <table class="ctab" style="margin-bottom:10px">
        <thead><tr>
          <th>Week</th><th style="text-align:right">Due</th>
          <th style="text-align:right">Active</th>
          <th style="text-align:right">Min Forecast</th>
          <th style="text-align:right">Adj Forecast</th>
        </tr></thead>
        <tbody>
          ${rows||'<tr><td colspan="5" style="color:var(--t3);text-align:center;padding:12px">No renewals due</td></tr>'}
          <tr style="border-top:1px solid var(--bdr2)">
            <td style="font-weight:700">Total</td>
            <td style="text-align:right;font-family:var(--mono);font-weight:600">${totCt}</td>
            <td style="text-align:right;font-family:var(--mono);font-weight:600;color:var(--grn)">${totMH}</td>
            <td style="text-align:right;font-family:var(--mono);font-weight:700;color:var(--grn)">$${fN(totMin)}</td>
            <td style="text-align:right;font-family:var(--mono);font-weight:700;color:var(--blu)">$${fN(totAdj)}</td>
          </tr>
        </tbody>
      </table>
      <div style="display:flex;gap:6px">
        <div style="flex:1;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:7px;padding:9px 11px">
          <div style="font-size:8px;font-family:var(--mono);color:var(--grn);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Min Forecast</div>
          <div style="font-size:20px;font-weight:700;font-family:var(--head);color:var(--grn)">$${fN(totMin)}</div>
          <div style="font-size:9px;color:var(--t3);margin-top:2px">${totMH} active × last billing</div>
        </div>
        <div style="flex:1;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);border-radius:7px;padding:9px 11px">
          <div style="font-size:8px;font-family:var(--mono);color:var(--blu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Adj Forecast</div>
          <div style="font-size:20px;font-weight:700;font-family:var(--head);color:var(--blu)">$${fN(totAdj)}</div>
          <div style="font-size:9px;color:var(--t3);margin-top:2px">+${((uplift-1)*100).toFixed(1)}% upgrade uplift</div>
        </div>
      </div>`;
  } else {
    // Monthly view: show Mar / Apr / May forecast
    const months = am.forecast_months; // ["Mar'26","Apr'26","May'26"]
    $('fc-period').textContent = `${months[0]} – ${months[months.length-1]}`;
    $('fc-sub').textContent = `Current month + 2-month ahead · Min = active subs × last billing · Adj = +${((uplift-1)*100).toFixed(1)}% upgrade uplift`;

    const moRows = months.map((mo,idx)=>{
      const d = am.forecast[`${reg}_${mo}`]||{};
      const isCurrentMo = idx===0;
      return `<tr ${isCurrentMo?'style="background:rgba(96,165,250,.05)"':''}>
        <td><span style="font-family:var(--mono);font-weight:${isCurrentMo?700:400};color:${isCurrentMo?'var(--blu)':'var(--t2)'}">${mo}${isCurrentMo?' <span style=\'font-size:8px;color:var(--t3)\'>current</span>':''}</span></td>
        <td style="text-align:right;font-family:var(--mono)">${d.count||0}</td>
        <td style="text-align:right;font-family:var(--mono);color:var(--grn)">${d.mh_count||0}</td>
        <td style="text-align:right;font-family:var(--mono);color:var(--grn)">$${fN(d.min_forecast||0)}</td>
        <td style="text-align:right;font-family:var(--mono);color:var(--blu)">$${fN(d.adj_forecast||0)}</td>
      </tr>`;
    }).join('');

    // Summary cards for each month
    const summaryCards = months.map((mo,idx)=>{
      const d = am.forecast[`${reg}_${mo}`]||{};
      const isNow = idx===0;
      return `
        <div style="flex:1;background:${isNow?'rgba(96,165,250,.08)':'var(--sur2)'};border:1px solid ${isNow?'rgba(96,165,250,.25)':'var(--bdr)'};border-radius:8px;padding:10px 12px">
          <div style="font-size:8px;font-family:var(--mono);color:${isNow?'var(--blu)':'var(--t3)'};text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${mo}${isNow?' · now':''}</div>
          <div style="margin-bottom:4px">
            <div style="font-size:9px;color:var(--t3);font-family:var(--mono)">Min</div>
            <div style="font-size:18px;font-weight:700;font-family:var(--head);color:var(--grn)">$${fN(d.min_forecast||0)}</div>
          </div>
          <div>
            <div style="font-size:9px;color:var(--t3);font-family:var(--mono)">Adjusted</div>
            <div style="font-size:18px;font-weight:700;font-family:var(--head);color:var(--blu)">$${fN(d.adj_forecast||0)}</div>
          </div>
          <div style="margin-top:6px;font-size:9px;color:var(--t3);font-family:var(--mono)">${d.mh_count||0} active / ${d.count||0} due</div>
        </div>`;
    }).join('');

    $('forecast-body').innerHTML = `
      <div style="display:flex;gap:6px;margin-bottom:12px">${summaryCards}</div>
      <table class="ctab">
        <thead><tr>
          <th>Month</th>
          <th style="text-align:right">Due</th>
          <th style="text-align:right">Active</th>
          <th style="text-align:right">Min Forecast</th>
          <th style="text-align:right">Adj Forecast</th>
        </tr></thead>
        <tbody>${moRows}</tbody>
      </table>
      <div style="margin-top:8px;font-size:9px;color:var(--t3);font-family:var(--mono)">
        Active = Medium + High stickiness · Adj applies ×${uplift.toFixed(3)} historical upgrade uplift
      </div>`;
  }
}

// ── init ──────────────────────────────────────────────────────
function render(){if(V==='W')buildW();else buildM();}
$('dbadge').textContent=`● ${fCW(RAW.anchor_cw)} · w/c ${fD(RAW.anchor_date)} · last complete week`;
render();
</script>
</body>
</html>
